version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pokedict
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend-hono
      dockerfile: Dockerfile
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 8080
      DATABASE_URL: postgresql://postgres:password@postgres:5432/pokedict
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-this-in-production-minimum-32-chars}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      ALLOWED_ORIGIN: http://localhost:5173
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    volumes:
      - ./backend-hono:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8080

volumes:
  postgres_data:
