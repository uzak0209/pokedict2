services:
  # гғҗгғғгӮҜгӮЁгғігғүй–Ӣзҷәз’°еўғ
  backend-dev:
    image: rust:latest
    container_name: pokedict-backend-dev
    working_dir: /app
    command: cargo run
    ports:
      - "8080:8080"
    environment:
      - HOST=0.0.0.0
      - PORT=8080
      - USE_POSTGRES=true
      - RUST_LOG=debug
      - DATABASE_URL=postgresql://postgres:password@db:5432/pokedict
      - JWT_SECRET=development_secret_key
      - CARGO_TARGET_DIR=/app/target
    volumes:
      - ./backend:/app
      - cargo-cache:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - target-cache:/app/target
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pokedict-network

  # гғ•гғӯгғігғҲгӮЁгғігғүй–Ӣзҷәз’°еўғ
  frontend-dev:
    image: node:20-alpine
    container_name: pokedict-frontend-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:8080/api
    volumes:
      - ./frontend:/app
      - node-modules:/app/node_modules
    depends_on:
      - backend-dev
    networks:
      - pokedict-network

  # гғҮгғјгӮҝгғҷгғјгӮ№
  db:
    image: postgres:16-alpine
    container_name: pokedict-db-dev
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=pokedict
    ports:
      - "5432:5432"
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pokedict-network

volumes:
  postgres-dev-data:
  cargo-cache:
  cargo-git:
  target-cache:
  node-modules:

networks:
  pokedict-network:
    driver: bridge
