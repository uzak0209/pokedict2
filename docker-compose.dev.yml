version: '3.8'

services:
  # гғҗгғғгӮҜгӮЁгғігғүй–Ӣзҷәз’°еўғ
  backend-dev:
    image: rust:1.75
    container_name: pokedict-backend-dev
    working_dir: /app
    command: cargo watch -x run
    ports:
      - "8080:8080"
    environment:
      - RUST_LOG=debug
      - DATABASE_URL=postgres://postgres:password@db:5432/pokedict
    volumes:
      - ./backend:/app
      - cargo-cache:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - target-cache:/app/target
    depends_on:
      - db
    networks:
      - pokedict-network

  # гғ•гғӯгғігғҲгӮЁгғігғүй–Ӣзҷәз’°еўғ
  frontend-dev:
    image: node:20-alpine
    container_name: pokedict-frontend-dev
    working_dir: /app
    command: npm run dev -- --host
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:8080
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend-dev
    networks:
      - pokedict-network

  # гғҮгғјгӮҝгғҷгғјгӮ№
  db:
    image: postgres:16-alpine
    container_name: pokedict-db-dev
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=pokedict
    ports:
      - "5432:5432"
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    networks:
      - pokedict-network

volumes:
  postgres-dev-data:
  cargo-cache:
  cargo-git:
  target-cache:

networks:
  pokedict-network:
    driver: bridge
